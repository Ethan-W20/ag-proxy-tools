name: Release

on:
  push:
    tags:
      - 'v*'

# Required to create releases and upload assets
permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: windows-x64

          # macOS Intel (x86_64)
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact-name: macos-intel

          # macOS Apple Silicon (M1/M2/M3)
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact-name: macos-arm

          # Linux x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact-name: linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.artifact-name }})

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Linux system dependencies ───────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ── 3. Set up Node.js ───────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Set up Rust ──────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── 5. Cache Rust build artifacts ───────────────────────────
      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 6. Install frontend dependencies ────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── 7. Build with Tauri ─────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AG_PROXY_GOOGLE_CLIENT_SECRET: ${{ secrets.AG_PROXY_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }} — AG Proxy Manager'
          releaseBody: |
            See [RELEASE_NOTES.md](https://github.com/${{ github.repository }}/blob/main/RELEASE_NOTES.md) for full release notes / 完整发布说明。
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
